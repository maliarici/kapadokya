<!doctype html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kapadokya</title>
  <style>
    :root {
      --card: rgba(255, 255, 255, 0.88);
      --text: #17202a;
      --line: rgba(208, 213, 221, 0.9);
      --blue: #2563eb;
      --blue-dark: #1d4ed8;
      --ok: #16a34a;
      --wrong: #dc2626;
    }

    * { box-sizing: border-box; }

    html, body { height: 100%; overflow: hidden; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      background:
        linear-gradient(rgba(255,255,255,0.18), rgba(255,255,255,0.18)),
        url("kapadokya-bg.png") center / cover no-repeat fixed;
      color: var(--text);
      padding: 10px;
    }

    .wrap {
      width: min(680px, calc(100vw - 20px));
      max-width: 680px;
      height: calc(100vh - 20px);
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 8px;
      position: relative;
      z-index: 1;
    }

    .topbar {
      min-height: 46px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      flex: 0 0 46px;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    button {
      border: 0;
      border-radius: 12px;
      padding: 10px 14px;
      font-weight: 700;
      cursor: pointer;
      background: #111827;
      color: white;
      font-size: 14px;
      height: 40px;
      display: inline-flex;
      align-items: center;
      gap: 7px;
    }

    button.check { background: var(--blue); }
    button.check:hover:not(:disabled) { background: var(--blue-dark); }

    button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    button:active:not(:disabled) { transform: translateY(1px); }

    .shuffle-icon {
      width: 18px;
      height: 18px;
      display: inline-block;
      color: currentColor;
      flex: 0 0 auto;
    }

    .countdown {
      width: 54px;
      height: 46px;
      display: grid;
      place-items: center;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.92);
      border: 2px solid rgba(37, 99, 235, 0.35);
      font-size: 24px;
      font-weight: 900;
      color: #1d4ed8;
      box-shadow: 0 4px 14px rgba(16, 24, 40, 0.14);
      visibility: hidden;
    }

    .countdown.show { visibility: visible; }

    .board {
      flex: 1 1 auto;
      min-height: 0;
      display: grid;
      grid-template-rows: repeat(11, minmax(0, 1fr));
      gap: 6px;
    }

    .row {
      min-height: 0;
      display: grid;
      grid-template-columns: 42px 1fr;
      gap: 8px;
      align-items: center;
      background: var(--card);
      border: 2px solid var(--line);
      border-radius: 14px;
      padding: 7px 9px;
      box-shadow: 0 4px 14px rgba(16, 24, 40, 0.10);
      backdrop-filter: blur(4px);
      transition: border-color 0.15s ease, background 0.15s ease, transform 0.15s ease;
      user-select: none;
    }

    .row.draggable {
      cursor: grab;
      touch-action: none;
    }

    .row.draggable:active {
      cursor: grabbing;
    }

    .row.locked {
      cursor: default;
    }

    .row.flash-correct {
      border-color: var(--ok);
      background: rgba(220, 252, 231, 0.94);
    }

    .row.flash-wrong {
      border-color: var(--wrong);
      background: rgba(254, 226, 226, 0.94);
    }

    .row.dragging {
      opacity: 0.28;
      transform: scale(0.99);
      pointer-events: none;
    }

    .row.drop-target {
      border-color: var(--blue);
      background: rgba(219, 234, 254, 0.96);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.14);
    }

    .drag-ghost {
      position: fixed;
      z-index: 10001;
      pointer-events: none;
      opacity: 0.96;
      transform: scale(1.03);
      box-shadow: 0 18px 34px rgba(16, 24, 40, 0.25);
    }

    .num {
      width: 34px;
      height: 34px;
      display: grid;
      place-items: center;
      border-radius: 11px;
      background: #f2f4f7;
      font-weight: 800;
      color: #344054;
      font-size: 14px;
    }

    .flash-correct .num { background: #bbf7d0; color: #166534; }
    .flash-wrong .num { background: #fecaca; color: #991b1b; }

    .text {
      font-size: clamp(12px, 1.35vw, 17px);
      line-height: 1.22;
      font-weight: 650;
      word-break: break-word;
      overflow: hidden;
      pointer-events: none;
    }

    #fireworks {
      position: fixed;
      inset: 0;
      z-index: 9999;
      pointer-events: none;
      display: block;
      visibility: hidden;
    }

    #fireworks.show { visibility: visible; }


    @media (max-width: 700px) {
      body { padding: 7px; }
      .wrap { width: calc(100vw - 14px); height: calc(100vh - 14px); gap: 6px; margin: 0 auto; }
      .topbar { min-height: 40px; flex-basis: 40px; gap: 6px; }
      .controls { gap: 6px; }
      button { padding: 8px 11px; font-size: 13px; height: 36px; }
      .shuffle-icon { width: 16px; height: 16px; }
      .countdown { width: 46px; height: 40px; font-size: 21px; }
      .board { gap: 5px; }
      .row {
        grid-template-columns: 34px 1fr;
        gap: 6px;
        padding: 5px 6px;
        border-radius: 12px;
      }
      .num { width: 28px; height: 28px; font-size: 12px; border-radius: 9px; }
      .text { font-size: clamp(10px, 2.4vw, 13px); line-height: 1.15; }
    }
  </style>
</head>
<body>
  <canvas id="fireworks"></canvas>

  <main class="wrap">
    <div class="topbar">
      <div class="controls">
        <button id="shuffleBtn">
          Karıştır
          <svg class="shuffle-icon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M3 7h3.7c2.2 0 3.4 1.1 4.8 3.1l1.1 1.6c1.2 1.8 2.2 2.3 4 2.3H21" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M18 11l3 3-3 3" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M3 17h3.7c1.8 0 2.8-.6 4-2.3l2-3c1.3-2 2.5-4.7 5-4.7H21" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M18 4l3 3-3 3" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
        <button id="checkBtn" class="check">Kontrol Et (3)</button>
      </div>
      <div id="countdown" class="countdown" aria-live="polite">5</div>
    </div>

    <section id="board" class="board" aria-label="Sıralama kartları"></section>
  </main>

  <script>
    const lines = [
      "Dört sene önce yaz tatilinde Kapadokya’ya gittik. Arabayı eşim",
      "sürdü. Yolda bir benzin istasyonunda durduk. Buradan, önce benzin",
      "aldık, sonra marketten içecek aldık. Bu küçük moladan sonra yola",
      "devam ettik. Yolda pek çok yerde durduk. Tuz Gölü’nün kenarında",
      "yürüdük, fotoğraf çektik. Öğle yemeğimizi de burada yedik. Eşim",
      "arabayı hep yavaş kullandı ve beni dikkatle dinledi. Ben navigasyona",
      "baktım ve ona “İki yüz metre sonra sağa dön.”, “Buradan sola dön.”",
      "diye yolu tarif ettim. Altı saat sonra \"Nevşehir'e Hoş Geldiniz\" yazısını",
      "gördük. Biraz sonra, sağda ve solda peribacalarını gördük. Çok",
      "heyecanlıydım. Eşime döndüm ve “İyi ki buradayız!” dedim. Sakin,",
      "güvenli ve eğlenceli bir yolculuktu. 😊"
    ];

    const fixed = { id: 1, text: lines[0] };
    let order = [];
    let draggedId = null;
    let flashTimer = null;
    let countdownTimer = null;
    let checksLeft = 3;
    let gameFrozen = false;
    let pointerDragId = null;
    let pointerDragSource = null;
    let pointerDragGhost = null;
    let pointerOffsetX = 0;
    let pointerOffsetY = 0;
    let pointerTargetIndex = -1;

    const board = document.getElementById("board");
    const shuffleBtn = document.getElementById("shuffleBtn");
    const checkBtn = document.getElementById("checkBtn");
    const countdown = document.getElementById("countdown");
    const fireworksCanvas = document.getElementById("fireworks");
    const fireworksCtx = fireworksCanvas.getContext("2d");

    function shuffle(array) {
      const copy = [...array];
      for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function updateCheckButton() {
      checkBtn.textContent = `Kontrol Et (${checksLeft})`;
      checkBtn.disabled = checksLeft === 0 || gameFrozen;
      shuffleBtn.disabled = gameFrozen;
    }

    function startGame() {
      clearFlash();
      stopFireworks();
      gameFrozen = false;
      checksLeft = 3;
      order = shuffle(lines.slice(1).map((text, index) => ({ id: index + 2, text })));
      updateCheckButton();
      render();
    }

    function currentRows() {
      return [fixed, ...order];
    }

    function isComplete() {
      return currentRows().every((row, index) => row.id === index + 1);
    }

    function render() {
      board.innerHTML = "";
      currentRows().forEach((row, index) => {
        const card = document.createElement("article");
        card.className = "row";
        card.dataset.id = row.id;
        card.dataset.index = index;

        if (index > 0 && !gameFrozen) {
          card.classList.add("draggable");
          card.addEventListener("pointerdown", handlePointerDown);
        } else {
          card.classList.add("locked");
        }

        card.innerHTML = `
          <div class="num">${index + 1}</div>
          <div class="text">${row.text}</div>
        `;

        board.appendChild(card);
      });
    }

    function clearFlash() {
      if (gameFrozen) return;
      if (flashTimer) clearTimeout(flashTimer);
      if (countdownTimer) clearInterval(countdownTimer);
      countdown.classList.remove("show");
      document.querySelectorAll(".row").forEach(card => {
        card.classList.remove("flash-correct", "flash-wrong");
      });
    }

    function clearTimersOnly() {
      if (flashTimer) clearTimeout(flashTimer);
      if (countdownTimer) clearInterval(countdownTimer);
      flashTimer = null;
      countdownTimer = null;
      countdown.classList.remove("show");
    }

    function startCountdown() {
      let remaining = 5;
      countdown.textContent = remaining;
      countdown.classList.add("show");

      countdownTimer = setInterval(() => {
        remaining -= 1;
        if (remaining > 0) {
          countdown.textContent = remaining;
        } else {
          clearInterval(countdownTimer);
          countdownTimer = null;
          countdown.classList.remove("show");
        }
      }, 1000);
    }

    function paintCheckColors() {
      const rows = currentRows();
      const cards = [...document.querySelectorAll(".row")];
      cards.forEach((card, index) => {
        card.classList.add(rows[index].id === index + 1 ? "flash-correct" : "flash-wrong");
      });
    }

    function freezeGame() {
      gameFrozen = true;
      draggedId = null;
      document.querySelectorAll(".row").forEach(card => {
        card.draggable = false;
        card.classList.remove("draggable", "dragging");
        card.classList.add("locked");
      });
      checkBtn.disabled = true;
      shuffleBtn.disabled = true;
    }

    function checkOrder() {
      if (checksLeft === 0 || gameFrozen) return;

      clearFlash();
      checksLeft -= 1;
      updateCheckButton();
      paintCheckColors();

      const complete = isComplete();
      const finalWrongTry = checksLeft === 0 && !complete;

      if (complete) {
        checkBtn.textContent = "Tamamlandı";
        freezeGame();
        clearTimersOnly();
        startFireworks();
        return;
      }

      if (finalWrongTry) {
        freezeGame();
        clearTimersOnly();
        return;
      }

      startCountdown();
      flashTimer = setTimeout(() => {
        document.querySelectorAll(".row").forEach(card => {
          card.classList.remove("flash-correct", "flash-wrong");
        });
      }, 5000);
    }

    function moveDraggedItem(targetDisplayIndex, idToMove) {
      if (targetDisplayIndex === 0 || idToMove === null) return;

      const from = order.findIndex(item => item.id === idToMove);
      const to = targetDisplayIndex - 1;
      if (from === -1 || to === -1 || from === to) return;

      const [moved] = order.splice(from, 1);
      order.splice(to, 0, moved);
      render();
    }

    function clearDropTargets() {
      document.querySelectorAll(".row.drop-target").forEach(card => {
        card.classList.remove("drop-target");
      });
    }

    function getDropTarget(clientX, clientY) {
      const target = document.elementFromPoint(clientX, clientY)?.closest(".row");
      if (!target) return null;
      const index = Number(target.dataset.index);
      if (index <= 0) return null;
      if (Number(target.dataset.id) === pointerDragId) return null;
      return target;
    }

    function moveGhost(clientX, clientY) {
      if (!pointerDragGhost) return;
      pointerDragGhost.style.left = `${clientX - pointerOffsetX}px`;
      pointerDragGhost.style.top = `${clientY - pointerOffsetY}px`;
    }

    function handlePointerDown(event) {
      if (gameFrozen || event.button > 0) return;
      event.preventDefault();
      clearFlash();

      pointerDragId = Number(event.currentTarget.dataset.id);
      pointerDragSource = event.currentTarget;
      pointerTargetIndex = -1;

      const rect = pointerDragSource.getBoundingClientRect();
      pointerOffsetX = event.clientX - rect.left;
      pointerOffsetY = event.clientY - rect.top;

      pointerDragGhost = pointerDragSource.cloneNode(true);
      pointerDragGhost.classList.add("drag-ghost");
      pointerDragGhost.classList.remove("dragging", "drop-target");
      pointerDragGhost.style.width = `${rect.width}px`;
      pointerDragGhost.style.height = `${rect.height}px`;
      pointerDragGhost.style.left = `${rect.left}px`;
      pointerDragGhost.style.top = `${rect.top}px`;
      document.body.appendChild(pointerDragGhost);

      pointerDragSource.classList.add("dragging");
      document.addEventListener("pointermove", handlePointerMove, { passive: false });
      document.addEventListener("pointerup", handlePointerUp, { passive: false });
      document.addEventListener("pointercancel", handlePointerCancel, { passive: false });
      moveGhost(event.clientX, event.clientY);
    }

    function handlePointerMove(event) {
      if (pointerDragId === null) return;
      event.preventDefault();
      moveGhost(event.clientX, event.clientY);

      clearDropTargets();
      const target = getDropTarget(event.clientX, event.clientY);
      if (target) {
        pointerTargetIndex = Number(target.dataset.index);
        target.classList.add("drop-target");
      } else {
        pointerTargetIndex = -1;
      }
    }

    function endPointerDrag(shouldMove) {
      if (shouldMove && pointerTargetIndex > 0) {
        moveDraggedItem(pointerTargetIndex, pointerDragId);
      }

      if (pointerDragSource) pointerDragSource.classList.remove("dragging");
      if (pointerDragGhost) pointerDragGhost.remove();
      clearDropTargets();

      pointerDragId = null;
      pointerDragSource = null;
      pointerDragGhost = null;
      pointerOffsetX = 0;
      pointerOffsetY = 0;
      pointerTargetIndex = -1;

      document.removeEventListener("pointermove", handlePointerMove);
      document.removeEventListener("pointerup", handlePointerUp);
      document.removeEventListener("pointercancel", handlePointerCancel);
    }

    function handlePointerUp(event) {
      if (pointerDragId === null) return;
      event.preventDefault();
      handlePointerMove(event);
      endPointerDrag(true);
    }

    function handlePointerCancel(event) {
      event.preventDefault();
      endPointerDrag(false);
    }

    let particles = [];
    let fireworksAnimation = null;

    function resizeFireworks() {
      fireworksCanvas.width = window.innerWidth;
      fireworksCanvas.height = window.innerHeight;
    }

    function makeBurst(x, y) {
      const colors = ["#ef4444", "#f59e0b", "#22c55e", "#3b82f6", "#a855f7", "#ec4899", "#ffffff"];
      for (let i = 0; i < 70; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = 2 + Math.random() * 5;
        particles.push({
          x,
          y,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          life: 75 + Math.random() * 25,
          age: 0,
          size: 2 + Math.random() * 3,
          color: colors[Math.floor(Math.random() * colors.length)]
        });
      }
    }

    function startFireworks() {
      resizeFireworks();
      fireworksCanvas.classList.add("show");
      fireworksCanvas.style.visibility = "visible";
      particles = [];
      makeBurst(window.innerWidth * 0.30, window.innerHeight * 0.28);
      makeBurst(window.innerWidth * 0.55, window.innerHeight * 0.20);
      makeBurst(window.innerWidth * 0.78, window.innerHeight * 0.32);

      let frames = 0;
      function animate() {
        frames += 1;
        fireworksCtx.clearRect(0, 0, fireworksCanvas.width, fireworksCanvas.height);

        if (frames === 35) makeBurst(window.innerWidth * 0.45, window.innerHeight * 0.38);

        particles.forEach(p => {
          p.age += 1;
          p.x += p.vx;
          p.y += p.vy;
          p.vy += 0.045;
          p.vx *= 0.985;
          p.vy *= 0.985;

          const alpha = Math.max(0, 1 - p.age / p.life);
          fireworksCtx.globalAlpha = alpha;
          fireworksCtx.fillStyle = p.color;
          fireworksCtx.beginPath();
          fireworksCtx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
          fireworksCtx.fill();
        });

        fireworksCtx.globalAlpha = 1;
        particles = particles.filter(p => p.age < p.life);

        if (frames < 110 || particles.length > 0) {
          fireworksAnimation = requestAnimationFrame(animate);
        } else {
          fireworksAnimation = null;
        }
      }
      animate();
    }

    function stopFireworks() {
      if (fireworksAnimation) cancelAnimationFrame(fireworksAnimation);
      fireworksAnimation = null;
      particles = [];
      fireworksCanvas.classList.remove("show");
      fireworksCanvas.style.visibility = "hidden";
      fireworksCtx.clearRect(0, 0, fireworksCanvas.width, fireworksCanvas.height);
    }

    window.addEventListener("resize", resizeFireworks);
    checkBtn.addEventListener("click", checkOrder);
    shuffleBtn.addEventListener("click", startGame);
    startGame();
  </script>
</body>
</html>
